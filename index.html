<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCE Equestrian Center</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#1A2744;min-height:100vh}
.hero{background:linear-gradient(135deg,#1A2744,#2C3E6B);color:#fff;padding:60px 20px;text-align:center}
.logo{font-size:56px;margin-bottom:16px}
.title{font-size:32px;font-weight:700;margin-bottom:8px}
.sub{font-size:16px;color:#C8923A;margin-bottom:40px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;max-width:900px;margin:0 auto;padding:40px 20px}
.card{background:#fff;border-radius:20px;padding:36px 28px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.2);cursor:pointer;transition:transform .2s,box-shadow .2s;text-decoration:none;display:block}
.card:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(0,0,0,.3)}
.card-icon{font-size:48px;margin-bottom:16px}
.card-title{font-size:20px;font-weight:700;color:#1A2744;margin-bottom:8px}
.card-desc{font-size:14px;color:#7A8399;line-height:1.5}
.card-btn{display:inline-block;margin-top:20px;background:#C8923A;color:#fff;border:none;border-radius:10px;padding:10px 28px;font-size:14px;font-weight:700;cursor:pointer}
.admin-link{text-align:center;padding:20px;color:#7A8399;font-size:12px}
.admin-link a{color:#7A8399;text-decoration:none}
.admin-link a:hover{color:#C8923A}
</style>
</head>
<body>
<div class="hero">
  <div class="logo">🏇</div>
  <div class="title">CCE Equestrian Center</div>
  <div class="sub">مركز تعليم ركوب الخيل</div>
</div>
<div class="cards">
  <a class="card" href="booking.html">
    <div class="card-icon">🐴</div>
    <div class="card-title">Book a Horse Ride</div>
    <div class="card-desc">حجز جولة على الخيل — اختر الخيل والوقت المناسب</div>
    <div class="card-btn">Book Now</div>
  </a>
  <a class="card" href="training.html">
    <div class="card-icon">🎯</div>
    <div class="card-title">Training Packages</div>
    <div class="card-desc">باقات تدريب ركوب الخيل — للمبتدئين والمحترفين</div>
    <div class="card-btn">View Packages</div>
  </a>
</div>
<div class="admin-link">
  <a href="admin.html">Staff Login</a>
</div>
</body>
</html>
