<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCE — Horse Owner Portal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#FDFAF4;color:#1A2744}
.header{background:#1A2744;color:#fff;padding:16px 20px;display:flex;align-items:center;gap:12px}
.header a{color:#C8923A;text-decoration:none;font-size:13px;margin-left:auto}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.logout-btn{background:none;border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:8px;padding:5px 12px;font-size:12px;cursor:pointer}

/* Login */
.login-wrap{min-height:calc(100vh - 62px);display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:#fff;border-radius:20px;padding:36px 28px;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,.1);text-align:center}
.login-icon{font-size:48px;margin-bottom:12px}
.login-title{font-size:20px;font-weight:700;color:#1A2744;margin-bottom:6px}
.login-sub{font-size:13px;color:#7A8399;margin-bottom:24px}
.inp{width:100%;border:1px solid #E3D9C6;border-radius:10px;padding:12px 16px;font-size:15px;background:#FDFAF4;outline:none;margin-bottom:12px;font-family:inherit;text-align:center}
.inp:focus{border-color:#C8923A}
.login-btn{width:100%;background:#1A2744;color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.login-btn:hover{background:#C8923A}
.err{color:#C0392B;font-size:13px;margin-top:8px;display:none}

/* Portal */
.portal{display:none;padding:20px;max-width:700px;margin:0 auto}
.welcome{background:linear-gradient(135deg,#1A2744,#2C3E6B);color:#fff;border-radius:16px;padding:20px 24px;margin-bottom:20px}
.welcome-name{font-size:20px;font-weight:700;margin-bottom:4px}
.welcome-sub{font-size:13px;color:#C8923A}

/* Horse cards */
.horse-section{margin-bottom:20px}
.section-title{font-size:15px;font-weight:700;color:#1A2744;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.horse-card{background:#fff;border:1px solid #E3D9C6;border-radius:14px;padding:18px;margin-bottom:12px}
.horse-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.horse-avatar{font-size:36px}
.horse-name{font-size:17px;font-weight:700;color:#1A2744}
.horse-meta{font-size:12px;color:#7A8399;margin-top:2px}
.badge{border-radius:12px;padding:2px 10px;font-size:11px;font-weight:700}
.badge-green{background:#E8F5EE;color:#1E7D4E}
.badge-red{background:#FDECEA;color:#C0392B}
.badge-amber{background:#FEF3E2;color:#C8923A}

/* Edit form */
.edit-toggle{background:#E8EAF0;color:#1A2744;border:none;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.edit-toggle:hover{background:#C8923A;color:#fff}
.edit-form{display:none;margin-top:16px;border-top:1px solid #E3D9C6;padding-top:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
@media(max-width:480px){.form-grid{grid-template-columns:1fr}}
.form-group label{font-size:11px;color:#7A8399;display:block;margin-bottom:4px;font-weight:600}
.form-group input,.form-group select{width:100%;border:1px solid #E3D9C6;border-radius:8px;padding:9px 11px;font-size:14px;background:#FDFAF4;font-family:inherit;outline:none}
.form-group input:focus,.form-group select:focus{border-color:#C8923A}
.form-group input[readonly]{background:#f5f5f5;color:#999;cursor:not-allowed}
.save-btn{background:#1E7D4E;color:#fff;border:none;border-radius:10px;padding:10px 24px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.save-btn:hover{opacity:.88}
.save-btn:disabled{opacity:.5;cursor:not-allowed}
.cancel-btn{background:#f0f0f0;color:#1A2744;border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-left:8px}

/* Horse info display */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:480px){.info-grid{grid-template-columns:1fr}}
.info-item{background:#FDFAF4;border-radius:8px;padding:10px 12px}
.info-label{font-size:10px;color:#7A8399;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.info-value{font-size:13px;font-weight:600;color:#1A2744}
</style>
</head>
<body>

<div class="header">
  <span style="font-size:22px">🏇</span>
  <div>
    <div style="font-size:15px;font-weight:700">CCE Equestrian Center</div>
    <div style="font-size:11px;color:#C8923A">Horse Owner Portal</div>
  </div>
  <div class="header-right">
    <a href="index.html" style="color:#C8923A;text-decoration:none;font-size:13px">← Home</a>
    <button class="logout-btn" id="logoutBtn" style="display:none" onclick="logout()">Logout</button>
  </div>
</div>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-icon">🐴</div>
    <div class="login-title">Owner Portal</div>
    <div class="login-sub">Login with your registered phone number</div>
    <input class="inp" type="tel" id="phoneInput" placeholder="Enter your phone number" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">🔐 Login</button>
    <div class="err" id="loginErr">❌ Phone number not found. Please contact CCE staff.</div>
  </div>
</div>

<!-- PORTAL -->
<div class="portal" id="portal">
  <div class="welcome">
    <div class="welcome-name">Welcome, <span id="ownerName"></span>! 👋</div>
    <div class="welcome-sub">Manage your horse(s) information</div>
  </div>
  <div class="horse-section">
    <div class="section-title">🐴 Your Horse(s)</div>
    <div id="horseList"></div>
  </div>
</div>

<script>
const SB_URL = 'https://ipiarzkljcictghtkcri.supabase.co';
const SB_KEY = 'sb_publishable_rmX0zdqsDXUj-7s2ijWzHQ_jaVGiuch';
const HDR = {
  'Content-Type':'application/json',
  'apikey':SB_KEY,
  'Authorization':'Bearer '+SB_KEY,
  'Prefer':'return=representation'
};

let ownerHorses = [];
let currentOwner = '';

// Clean phone number for comparison
function cleanPhone(p) {
  if(!p) return '';
  return String(p).replace('.0','').replace(/\s/g,'').trim();
}

async function doLogin() {
  const phone = document.getElementById('phoneInput').value.trim();
  if(!phone) { alert('Please enter your phone number'); return; }

  const btn = document.querySelector('.login-btn');
  btn.textContent = '⏳ Checking...';
  btn.disabled = true;

  try {
    // Fetch all horses and find matching phone
    const r = await fetch(`${SB_URL}/rest/v1/horses?select=*&limit=200`, {headers:HDR});
    const horses = await r.json();

    // Find horses with matching contact
    const matched = horses.filter(h => h.contact && cleanPhone(h.contact) === cleanPhone(phone) && h.horse_name);

    if(matched.length === 0) {
      document.getElementById('loginErr').style.display = 'block';
      btn.textContent = '🔐 Login';
      btn.disabled = false;
      return;
    }

    // Success
    ownerHorses = matched;
    currentOwner = matched[0].owner || 'Owner';
    sessionStorage.setItem('owner_phone', phone);
    sessionStorage.setItem('owner_name', currentOwner);

    showPortal();

  } catch(e) {
    alert('Connection error: ' + e.message);
    btn.textContent = '🔐 Login';
    btn.disabled = false;
  }
}

function showPortal() {
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('portal').style.display = 'block';
  document.getElementById('logoutBtn').style.display = 'block';
  document.getElementById('ownerName').textContent = currentOwner;
  renderHorses();
}

function logout() {
  sessionStorage.removeItem('owner_phone');
  sessionStorage.removeItem('owner_name');
  ownerHorses = [];
  currentOwner = '';
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('portal').style.display = 'none';
  document.getElementById('logoutBtn').style.display = 'none';
  document.getElementById('phoneInput').value = '';
}

function fmt(d) {
  if(!d) return '—';
  try { return new Date(d+'T00:00:00').toLocaleDateString('en-GB'); } catch(e){ return d; }
}

function statusBadge(s) {
  const cls = s==='Available'?'badge-green':s==='Occupied'?'badge-red':'badge-amber';
  return `<span class="badge ${cls}">${s||'—'}</span>`;
}

function renderHorses() {
  const list = document.getElementById('horseList');
  list.innerHTML = ownerHorses.map((h,i) => `
    <div class="horse-card">
      <div class="horse-header">
        <div class="horse-avatar">🐴</div>
        <div style="flex:1">
          <div class="horse-name">${h.horse_name}</div>
          <div class="horse-meta">Stable #${h.stable_no||'—'} · ${statusBadge(h.status)}</div>
        </div>
        <button class="edit-toggle" onclick="toggleEdit(${i})">✏️ Edit Info</button>
      </div>

      <!-- Info Display -->
      <div id="infoDisplay_${i}" class="info-grid">
        <div class="info-item"><div class="info-label">Sex</div><div class="info-value">${h.sex||'—'}</div></div>
        <div class="info-item"><div class="info-label">Color</div><div class="info-value">${h.color||'—'}</div></div>
        <div class="info-item"><div class="info-label">Breed</div><div class="info-value">${h.breed||'—'}</div></div>
        <div class="info-item"><div class="info-label">Birth Date</div><div class="info-value">${fmt(h.birth_date)}</div></div>
        <div class="info-item"><div class="info-label">Microchip</div><div class="info-value">${h.microchip||'—'}</div></div>
        <div class="info-item"><div class="info-label">Passport</div><div class="info-value">${h.passport||'—'}</div></div>
        <div class="info-item"><div class="info-label">Farrier Date</div><div class="info-value">${fmt(h.farrier_date)}</div></div>
        <div class="info-item"><div class="info-label">Vaccine Date</div><div class="info-value">${fmt(h.vaccine_date)}</div></div>
        <div class="info-item"><div class="info-label">Worm Date</div><div class="info-value">${fmt(h.worm_date)}</div></div>
        <div class="info-item"><div class="info-label">Medicant</div><div class="info-value">${h.medicant||'—'}</div></div>
        <div class="info-item"><div class="info-label">Med Date</div><div class="info-value">${fmt(h.med_date)}</div></div>
        <div class="info-item"><div class="info-label">Contact</div><div class="info-value">${h.contact?String(h.contact).replace('.0',''):'—'}</div></div>
        <div class="info-item"><div class="info-label">Address</div><div class="info-value">${h.address||'—'}</div></div>
        <div class="info-item"><div class="info-label">CPR</div><div class="info-value">${h.cpr||'—'}</div></div>
      </div>

      <!-- Edit Form -->
      <div class="edit-form" id="editForm_${i}">
        <div class="form-grid">
          <div class="form-group"><label>Horse Name</label><input type="text" id="eh_name_${i}" value="${h.horse_name||''}"></div>
          <div class="form-group"><label>Owner</label><input type="text" id="eh_owner_${i}" value="${h.owner||''}"></div>
          <div class="form-group"><label>Contact</label><input type="text" id="eh_contact_${i}" value="${h.contact?String(h.contact).replace('.0',''):''}"></div>
          <div class="form-group"><label>CPR</label><input type="text" id="eh_cpr_${i}" value="${h.cpr||''}"></div>
          <div class="form-group"><label>Address</label><input type="text" id="eh_address_${i}" value="${h.address||''}"></div>
          <div class="form-group"><label>Sex</label>
            <select id="eh_sex_${i}">
              ${['','Stallion','Mare','Gelding'].map(s=>`<option ${h.sex===s?'selected':''}>${s}</option>`).join('')}
            </select>
          </div>
          <div class="form-group"><label>Color</label><input type="text" id="eh_color_${i}" value="${h.color||''}"></div>
          <div class="form-group"><label>Breed</label><input type="text" id="eh_breed_${i}" value="${h.breed||''}"></div>
          <div class="form-group"><label>Birth Date</label><input type="date" id="eh_birth_${i}" value="${h.birth_date||''}"></div>
          <div class="form-group"><label>Microchip</label><input type="text" id="eh_micro_${i}" value="${h.microchip||''}"></div>
          <div class="form-group"><label>Passport</label><input type="text" id="eh_passport_${i}" value="${h.passport||''}"></div>
          <div class="form-group"><label>Farrier Date</label><input type="date" id="eh_farrier_${i}" value="${h.farrier_date||''}"></div>
          <div class="form-group"><label>Vaccine Date</label><input type="date" id="eh_vaccine_${i}" value="${h.vaccine_date||''}"></div>
          <div class="form-group"><label>Worm Date</label><input type="date" id="eh_worm_${i}" value="${h.worm_date||''}"></div>
          <div class="form-group"><label>Medicant</label><input type="text" id="eh_medicant_${i}" value="${h.medicant||''}"></div>
          <div class="form-group"><label>Med Date</label><input type="date" id="eh_meddate_${i}" value="${h.med_date||''}"></div>
          <div class="form-group"><label>Stable No</label><input type="text" id="eh_stable_${i}" value="${h.stable_no||''}"></div>
          <div class="form-group"><label>Livery BD/month</label><input type="text" readonly value="${h.livery_bd||0}" style="background:#f5f5f5;color:#999"></div>
          <div class="form-group"><label>AC Livery BD</label><input type="text" readonly value="${h.ac_livery_bd||0}" style="background:#f5f5f5;color:#999"></div>
          <div class="form-group"><label>Payment</label><input type="text" readonly value="${h.payment||'—'}" style="background:#f5f5f5;color:#999"></div>
        </div>
        <button class="save-btn" onclick="saveHorse(${i},${h.id})">💾 Save Changes</button>
        <button class="cancel-btn" onclick="toggleEdit(${i})">Cancel</button>
      </div>
    </div>
  `).join('');
}

function toggleEdit(i) {
  const form = document.getElementById('editForm_'+i);
  const info = document.getElementById('infoDisplay_'+i);
  const isOpen = form.style.display === 'block';
  form.style.display = isOpen ? 'none' : 'block';
  info.style.display = isOpen ? 'grid' : 'none';
}

async function saveHorse(i, id) {
  const btn = document.querySelector(`#editForm_${i} .save-btn`);
  btn.disabled = true;
  btn.textContent = '⏳ Saving...';

  try {
    const data = {
      horse_name:   document.getElementById(`eh_name_${i}`).value,
      owner:        document.getElementById(`eh_owner_${i}`).value,
      contact:      document.getElementById(`eh_contact_${i}`).value||null,
      cpr:          document.getElementById(`eh_cpr_${i}`).value||null,
      address:      document.getElementById(`eh_address_${i}`).value||null,
      sex:          document.getElementById(`eh_sex_${i}`).value||null,
      color:        document.getElementById(`eh_color_${i}`).value||null,
      breed:        document.getElementById(`eh_breed_${i}`).value||null,
      birth_date:   document.getElementById(`eh_birth_${i}`).value||null,
      microchip:    document.getElementById(`eh_micro_${i}`).value||null,
      passport:     document.getElementById(`eh_passport_${i}`).value||null,
      farrier_date: document.getElementById(`eh_farrier_${i}`).value||null,
      vaccine_date: document.getElementById(`eh_vaccine_${i}`).value||null,
      worm_date:    document.getElementById(`eh_worm_${i}`).value||null,
      medicant:     document.getElementById(`eh_medicant_${i}`).value||null,
      med_date:     document.getElementById(`eh_meddate_${i}`).value||null,
      stable_no:    document.getElementById(`eh_stable_${i}`).value||null,
      // livery_bd, ac_livery_bd, payment — NOT included (read-only)
    };

    const r = await fetch(`${SB_URL}/rest/v1/horses?id=eq.${id}`, {
      method: 'PATCH', headers: HDR, body: JSON.stringify(data)
    });
    if(!r.ok) throw new Error(await r.text());

    // Update local data
    Object.assign(ownerHorses[i], data);

    toggleEdit(i);
    renderHorses();
    alert('✅ Horse information updated successfully!');

  } catch(e) {
    alert('Error: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '💾 Save Changes';
  }
}

// Auto-login if session exists
window.onload = async function() {
  const savedPhone = sessionStorage.getItem('owner_phone');
  const savedName  = sessionStorage.getItem('owner_name');
  if(savedPhone && savedName) {
    document.getElementById('phoneInput').value = savedPhone;
    await doLogin();
  }
};
</script>
</body>
</html>
