<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCE — Admin Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#1A2744;min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.4);text-align:center}
.logo{font-size:48px;margin-bottom:12px}
.title{font-size:22px;font-weight:700;color:#1A2744;margin-bottom:6px}
.sub{font-size:13px;color:#7A8399;margin-bottom:28px}
input{width:100%;border:1px solid #E3D9C6;border-radius:10px;padding:12px 16px;font-size:15px;background:#FDFAF4;outline:none;margin-bottom:14px;font-family:inherit;text-align:center;letter-spacing:2px}
input:focus{border-color:#C8923A}
button{width:100%;background:#1A2744;color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
button:hover{background:#C8923A}
.error{color:#C0392B;font-size:13px;margin-top:10px;display:none}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">🏇</div>
  <div class="title">CCE Equestrian Center</div>
  <div class="sub">Admin Access Only</div>
  <input type="password" id="pwd" placeholder="Enter Password" onkeydown="if(event.key==='Enter')login()">
  <button onclick="login()">🔐 Login</button>
  <div class="error" id="err">❌ Incorrect password</div>
</div>
<script>
function login() {
  const pwd = document.getElementById('pwd').value;
  if (pwd === 'Manama21') {
    sessionStorage.setItem('cce_auth', 'true');
    window.location.href = 'dashboard.html';
  } else {
    document.getElementById('err').style.display = 'block';
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
}
// If already logged in, redirect
if (sessionStorage.getItem('cce_auth') === 'true') {
  window.location.href = 'dashboard.html';
}
</script>
</body>
</html>
